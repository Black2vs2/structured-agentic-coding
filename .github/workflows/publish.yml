name: Publish Release

# Triggers when a release PR is merged to main.
# Detects commits whose message contains "release: v" (set by the Release workflow).
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-release:
    # Only run for release commits (squash merge produces "release: vX.Y.Z (#N)")
    if: contains(github.event.head_commit.message, 'release: v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from commit message
        id: version
        run: |
          MSG="${{ github.event.head_commit.message }}"
          # Handle both "release: v1.2.3" and "release: v1.2.3 (#N)"
          VERSION=$(echo "$MSG" | grep -oP '(?<=release: v)[\d.]+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected release version: $VERSION"

      - name: Create and push tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "v${VERSION}" "${{ github.sha }}"
          git push origin "v${VERSION}"

      - name: Extract changelog entry for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG="structured-agentic-coding-plugin/CHANGELOG.md"

          # Extract lines between "## [VERSION]" and the next "## [" heading
          ENTRY=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" "$CHANGELOG" \
            | sed '/^[[:space:]]*$/d' | head -50)

          echo "entry<<ENTRY_EOF" >> "$GITHUB_OUTPUT"
          echo "$ENTRY" >> "$GITHUB_OUTPUT"
          echo "ENTRY_EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          body: "${{ steps.changelog.outputs.entry }}"
          draft: false
          prerelease: false

      - name: Delete release branch
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git push origin --delete "release/v${VERSION}" || true
