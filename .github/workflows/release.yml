name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Release type (semver)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Compute new version
        id: version
        run: |
          CURRENT=$(jq -r '.version' structured-agentic-coding-plugin/.claude-plugin/plugin.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.version_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "Current: $CURRENT → New: $NEW"

      - name: Generate changelog entry
        id: changelog
        run: |
          NEW_VERSION="${{ steps.version.outputs.new }}"
          TODAY=$(date +%Y-%m-%d)

          LAST_TAG=$(git tag --sort=-v:refname | head -1 || true)
          RANGE="${LAST_TAG:+${LAST_TAG}..HEAD}"
          [[ -z "$RANGE" ]] && RANGE="HEAD"

          ADDED=""
          CHANGED=""
          FIXED=""

          while IFS= read -r msg; do
            [[ -z "$msg" ]] && continue
            clean_msg=$(echo "$msg" | sed 's/^[a-z]*([^)]*): //' | sed 's/^[a-z]*: //')
            if echo "$msg" | grep -qE '^feat(\(|:)'; then
              ADDED+=$'\n'"- $clean_msg"
            elif echo "$msg" | grep -qE '^fix(\(|:)'; then
              FIXED+=$'\n'"- $clean_msg"
            elif echo "$msg" | grep -qE '^(refactor|perf|style)(\(|:)'; then
              CHANGED+=$'\n'"- $clean_msg"
            fi
          done < <(git log "$RANGE" --pretty=format:"%s" -- structured-agentic-coding-plugin/)

          ENTRY="## [${NEW_VERSION}] - ${TODAY}"
          [[ -n "$ADDED" ]] && ENTRY+=$'\n\n'"### Added${ADDED}"
          [[ -n "$CHANGED" ]] && ENTRY+=$'\n\n'"### Changed${CHANGED}"
          [[ -n "$FIXED" ]] && ENTRY+=$'\n\n'"### Fixed${FIXED}"

          if [[ -z "$ADDED" && -z "$CHANGED" && -z "$FIXED" ]]; then
            ENTRY+=$'\n\n'"### Changed"$'\n'"- Version bump to ${NEW_VERSION}"
          fi

          echo "entry<<ENTRY_EOF" >> "$GITHUB_OUTPUT"
          echo "$ENTRY" >> "$GITHUB_OUTPUT"
          echo "ENTRY_EOF" >> "$GITHUB_OUTPUT"

      - name: Update plugin.json version
        run: |
          NEW_VERSION="${{ steps.version.outputs.new }}"
          jq --arg v "$NEW_VERSION" '.version = $v' \
            structured-agentic-coding-plugin/.claude-plugin/plugin.json > tmp.json
          mv tmp.json structured-agentic-coding-plugin/.claude-plugin/plugin.json

      - name: Update CHANGELOG.md
        run: |
          CHANGELOG="structured-agentic-coding-plugin/CHANGELOG.md"
          ENTRY="${{ steps.changelog.outputs.entry }}"

          awk -v entry="$ENTRY" '
            /^## \[Unreleased\]/ {
              print
              print ""
              print entry
              next
            }
            { print }
          ' "$CHANGELOG" > tmp_changelog.md
          mv tmp_changelog.md "$CHANGELOG"

      - name: Create release branch and push
        run: |
          NEW_VERSION="${{ steps.version.outputs.new }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/v${NEW_VERSION}"
          git add structured-agentic-coding-plugin/.claude-plugin/plugin.json
          git add structured-agentic-coding-plugin/CHANGELOG.md
          git commit -m "release: v${NEW_VERSION}"
          git push origin "release/v${NEW_VERSION}"

      - name: Create pull request
        uses: actions/github-script@v7
        with:
          script: |
            const newVersion = '${{ steps.version.outputs.new }}';
            const entry = `${{ steps.changelog.outputs.entry }}`;

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `release: v${newVersion}`,
              head: `release/v${newVersion}`,
              base: 'main',
              body: [
                `## Release v${newVersion}`,
                '',
                entry,
                '',
                '---',
                '',
                'Merging this PR will trigger the **Publish Release** workflow, which creates',
                `the \`v${newVersion}\` tag and GitHub Release automatically.`,
                '',
                '> **Merge strategy:** Use **Squash and merge** and keep the PR title as the',
                '> commit message so the publish workflow can detect it.',
              ].join('\n'),
            });

            core.info(`Created PR #${pr.data.number}: ${pr.data.html_url}`);
            core.summary.addRaw(`### Release PR created\n\n[PR #${pr.data.number}](${pr.data.html_url}) — merge it to publish v${newVersion}.`);
            await core.summary.write();

            // Enable auto-merge (requires "Allow auto-merge" in repo settings)
            try {
              await github.graphql(`
                mutation EnableAutoMerge($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: SQUASH
                  }) { pullRequest { autoMergeRequest { mergeMethod } } }
                }
              `, { pullRequestId: pr.data.node_id });
              core.info('Auto-merge enabled (squash)');
            } catch (e) {
              core.info(`Auto-merge not enabled: ${e.message}`);
              core.info('Enable "Allow auto-merge" in repo Settings > General to use this feature.');
            }
