name: Release

# Requires a repo secret named RELEASE_TOKEN:
# a PAT with 'repo' + 'workflow' scopes from an admin account.
# Settings → Secrets and variables → Actions → New repository secret

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Release type'
        required: true
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Compute new version
        id: ver
        run: |
          CURRENT=$(jq -r '.version' structured-agentic-coding-plugin/.claude-plugin/plugin.json)
          IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
          case "${{ inputs.version_type }}" in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            patch) PAT=$((PAT+1)) ;;
          esac
          NEW="${MAJ}.${MIN}.${PAT}"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "Releasing $CURRENT → $NEW"

      - name: Update plugin.json
        run: |
          jq --arg v "${{ steps.ver.outputs.new }}" '.version = $v' \
            structured-agentic-coding-plugin/.claude-plugin/plugin.json > tmp.json
          mv tmp.json structured-agentic-coding-plugin/.claude-plugin/plugin.json

      - name: Update CHANGELOG.md
        run: |
          ENTRY="## [${{ steps.ver.outputs.new }}] - $(date +%Y-%m-%d)"
          awk -v e="$ENTRY" '
            /^## \[Unreleased\]/ { print; print ""; print e; next }
            { print }
          ' structured-agentic-coding-plugin/CHANGELOG.md > tmp.md
          mv tmp.md structured-agentic-coding-plugin/CHANGELOG.md

      - name: Commit, tag, push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add structured-agentic-coding-plugin/.claude-plugin/plugin.json \
                  structured-agentic-coding-plugin/CHANGELOG.md
          git commit -m "release: v${{ steps.ver.outputs.new }}"
          git tag "v${{ steps.ver.outputs.new }}"
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.ver.outputs.new }}"
          name: "v${{ steps.ver.outputs.new }}"
          generate_release_notes: true
